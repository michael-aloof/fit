</head>

<body>

<h1>
Перемикання між block та inline
</h1>

<p>
Нижче наведено елемент DIV та елемент SPAN.
</p>

<div id="textBox">

Це блоковий елемент DIV.

<span>
Всередині нього знаходиться SPAN.
</span>

</div>

<button onclick="changeMode()">
Змінити режим відображення
</button>

<p id="status">
Поточний режим: block
</p>

<script>

function changeMode()
{

    let box = document.getElementById("textBox");

    let status = document.getElementById("status");

    if(box.style.display == "inline")
    {

        box.style.display = "block";

        status.innerHTML =
        "Поточний режим: block";

        console.log("Зараз активний режим block");

    }

    else
    {

        box.style.display = "inline";

        status.innerHTML =
        "Поточний режим: inline";

        console.log("Зараз активний режим inline");

    }

}

</script>

</body>
