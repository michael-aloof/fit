<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Лабораторна робота №4</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Лабораторна робота №4</h1>

<h2>1. Вивід повідомлення</h2>
<button id="btnMessage" type="button">Показати повідомлення</button>

<hr>

<h2>2. Робота з input</h2>
<input type="text" id="x1" placeholder="Введіть число">
<button id="btnShowNumber" type="button">Показати число</button>

<hr>

<h2>3. Зміна тексту</h2>
<p id="demo1">Тут з'явиться введене число</p>
<button id="btnChangeText" type="button">Змінити текст</button>

<hr>

<h2>4. Виведення у консоль</h2>
<button id="btnConsole" type="button">Натиснути</button>
<p id="consoleText">Текст для перевірки консолі</p>

<hr>

<h2>5-6. Арифметика та parseFloat</h2>
<input type="text" id="a" placeholder="x1">
+
<input type="text" id="b" placeholder="x2">
<button id="btnCalc" type="button">Обчислити</button>
<p id="result"></p>

<hr>

<h2>7. Умовний оператор</h2>
<input type="text" id="field1" placeholder="Поле 1">
<input type="text" id="field2" placeholder="Поле 2">
<button id="btnCheck" type="button">Перевірити</button>

<hr>

<h2>8. Зміна стилю через JS</h2>
<button id="btnChangeColor" type="button">Зробити текст червоним</button>

<script src="script.js"></script>
</body>
</html>
